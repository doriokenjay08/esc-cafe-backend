<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESC Cafe – Full Menu</title>
  <link rel="icon" type="image/jpeg" href="images/logo.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="main-menu.css" />
  <style>
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #f0e8e0;
      border-top-color: #8B4513;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .btn-add-cart {
      margin-top: 8px;
      padding: 6px 16px;
      background: #8B4513;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: block;
      width: 100%;
    }

    .btn-add-cart:hover {
      background: #6b3410;
      transform: scale(1.03);
    }

    .mm-card-desc {
      font-size: 11px;
      color: #888;
      margin: 4px 0;
    }

    .nav-cart-wrap {
      position: relative;
      display: inline-block;
    }

    .cart-badge {
      position: absolute;
      top: -6px;
      right: -8px;
      background: #8B4513;
      color: #fff;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }

    .cart-link-btn {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 28px;
      background: #8B4513;
      color: #fff;
      text-decoration: none;
      border-radius: 30px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s;
    }

    .cart-link-btn:hover {
      background: #6b3410;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo" aria-label="ESC Logo">
      <img src="images/logo.png" alt="ESC Cafe Logo" />
    </div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html" class="active">Menu</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="account.html">Account</a></li>
    </ul>
    <a href="cart.html" class="nav-cart-wrap">
      <div class="nav-cart" aria-label="Cart">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 01-8 0" />
        </svg>
        <span class="cart-badge" id="cartBadge1"></span>
      </div>
    </a>
  </nav>

  <section class="main-menu-section">
    <div class="main-menu-heading">
      <p class="main-menu-script">Our</p>
      <h1 class="main-menu-title">MENU</h1>
      <div class="main-menu-underline"></div>
      <a href="cart.html" class="cart-link-btn">🛒 View Cart</a>
    </div>
  </section>

  <footer>
    <div class="footer-logo">
      <img src="images/logo.png" alt="ESC Cafe Logo" />
    </div>
    <p class="footer-tagline">Every sip counts.</p>
    <p class="footer-copy">©2026 ESC Cafe. All rights reserved.</p>
  </footer>

  <script src="index.js"></script>
  <script src="main-menu.js"></script>
</body>

</html>
