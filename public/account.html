<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESC Cafe – Account</title>
  <link rel="icon" type="image/jpeg" href="images/logo.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .account-tabs {
      display: flex;
      border-bottom: 2px solid #ddd;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 0;
      background: none;
      border: none;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      letter-spacing: .06em;
      text-transform: uppercase;
      transition: color .2s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .tab-btn.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    .tab-btn:hover:not(.active) {
      color: var(--dark);
    }

    .social-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      background: #fff;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--dark);
      cursor: pointer;
      transition: background .2s, border-color .2s, box-shadow .2s;
      border-radius: 4px;
    }

    .btn-social svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .btn-social:hover {
      background: #f5f5f5;
      border-color: #bbb;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
    }

    .account-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #bbb;
      font-size: 12px;
    }

    .account-divider::before,
    .account-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .btn-submit {
      width: 100%;
      background: var(--blue);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 15px;
      border: none;
      cursor: pointer;
      transition: background .2s, transform .15s;
      margin-top: 8px;
      margin-bottom: 4px;
    }

    .btn-submit:hover {
      background: #1a3de0;
      transform: translateY(-2px);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .form-status {
      min-height: 20px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      margin-top: 8px;
      color: var(--rust);
    }

    .login-logo-sm {
      display: block;
      margin: 0 auto 20px;
    }

    .nav-cart-wrap {
      position: relative;
      display: inline-block;
    }

    .cart-badge {
      position: absolute;
      top: -6px;
      right: -8px;
      background: var(--rust);
      color: #fff;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }

    #registerForm .form-group {
      margin-bottom: 16px;
    }

    #loginForm .form-group {
      margin-bottom: 16px;
    }
  </style>
</head>

<body data-page="login">

  <nav class="navbar">
    <div class="logo" aria-label="ESC Logo">
      <img src="images/logo.png" alt="ESC Cafe Logo" />
    </div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="account.html" class="active">Account</a></li>
    </ul>
    <a href="cart.html" class="nav-cart-wrap">
      <div class="nav-cart" aria-label="Cart">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 01-8 0" />
        </svg>
        <span class="cart-badge"></span>
      </div>
    </a>
  </nav>

  <div class="login-wrapper">

    <div class="login-left">
      <img class="login-bg" src="images/logo.png" alt="ESC Cafe" />
      <div class="login-left-overlay"></div>
      <div class="login-brand">
        <img class="login-logo" src="images/logo.png" alt="ESC Logo" />
        <h1 class="login-tagline-big">Every Sip<br>Counts</h1>
        <p class="login-script">Good coffee. Good people.</p>
      </div>
    </div>

    <div class="login-right">
      <div class="login-form-wrap">

        <img class="login-logo-sm" src="images/logo.png" alt="ESC Logo" width="52" height="52" />

        <div class="account-tabs">
          <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
          <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Sign Up</button>
        </div>

        <div class="social-btns">
          <button class="btn-social btn-google" onclick="loginWithGoogle()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4" />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853" />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                fill="#FBBC05" />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335" />
            </svg>
            Continue with Google
          </button>
          <button class="btn-social btn-facebook" onclick="loginWithFacebook()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#1877F2">
              <path
                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
            </svg>
            Continue with Facebook
          </button>
        </div>

        <div class="account-divider"><span>or</span></div>

        <div id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <div class="password-wrap">
              <input type="password" id="loginPassword" placeholder="••••••••" />
              <button type="button" class="toggle-pw" onclick="togglePw('loginPassword')" aria-label="Show password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" /> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <button class="btn-submit" onclick="handleLogin()">Sign In</button>
          <div class="form-status" id="loginStatus"></div>
        </div>

        <div id="registerForm" style="display:none">
          <div class="form-group">
            <label for="regName">Full Name</label>
            <input type="text" id="regName" placeholder="Juan dela Cruz" />
          </div>
          <div class="form-group">
            <label for="regEmail">Email</label>
            <input type="email" id="regEmail" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label for="regPassword">Password</label>
            <div class="password-wrap">
              <input type="password" id="regPassword" placeholder="••••••••" />
              <button type="button" class="toggle-pw" onclick="togglePw('regPassword')" aria-label="Show password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <button class="btn-submit" onclick="handleRegister()">Create Account</button>
          <div class="form-status" id="registerStatus"></div>
        </div>

        <div class="back-home">
          <a href="index.html">← Back to Home</a>
        </div>

      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>

</html>
