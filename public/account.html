<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESC Cafe – Account</title>
  <link rel="icon" type="image/jpeg" href="/images/logo.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="login">
  <nav class="navbar">
    <div class="logo" aria-label="ESC Logo">
      <img src="/images/logo.png" alt="ESC Cafe Logo" />
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="account.html" class="active">Account</a></li>
    </ul>
    <a href="cart.html">
      <div class="nav-cart" aria-label="Cart">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 01-8 0" />
        </svg>
      </div>
    </a>
  </nav>

  <div class="account-wrapper">
    <div class="account-left">
      <img class="account-bg" src="/images/logo.png" alt="ESC Cafe" />
      <div class="account-left-overlay"></div>
      <div class="account-brand">
        <img class="account-logo" src="/images/logo.png" alt="ESC Logo" />
        <h1 class="account-tagline-big">Every Sip<br>Counts</h1>
        <p class="account-script">Good coffee. Good people.</p>
      </div>
    </div>

    <div class="account-right">
      <div class="account-form-wrap">
        <div class="account-tabs">
          <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
          <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Sign Up</button>
        </div>

        <div class="social-btns">
          <button class="btn-social btn-google" onclick="loginWithGoogle()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4" />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853" />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                fill="#FBBC05" />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335" />
            </svg>
            Continue with Google
          </button>
          <button class="btn-social btn-facebook" onclick="loginWithFacebook()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#1877F2">
              <path
                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
            </svg>
            Continue with Facebook
          </button>
        </div>

        <div class="account-divider"><span>or</span></div>

        <div id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <div class="password-wrap">
              <input type="password" id="loginPassword" placeholder="••••••••" />
              <button type="button" class="toggle-pw" onclick="togglePw('loginPassword')" aria-label="Show password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" /> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <button class="btn-submit" onclick="handleLogin()">Sign In</button>
          <div class="form-status" id="loginStatus"></div>
        </div>

        <div id="registerForm" style="display:none">
          <div class="form-group">
            <label for="regName">Full Name</label>
            <input type="text" id="regName" placeholder="Juan dela Cruz" />
          </div>
          <div class="form-group">
            <label for="regEmail">Email</label>
            <input type="email" id="regEmail" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label for="regPassword">Password</label>
            <div class="password-wrap">
              <input type="password" id="regPassword" placeholder="••••••••" />
              <button class="toggle-pw" onclick="togglePw('regPassword')" aria-label="Show password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <button class="btn-submit" onclick="handleRegister()">Create Account</button>
          <div class="form-status" id="registerStatus"></div>
        </div>

        <div class="back-home">
          <a href="index.html">← Back to Home</a>
        </div>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>

</html>
